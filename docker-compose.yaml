services:
  db:
    image: postgres
    restart: unless-stopped
    ports:
      - 5432:5432
    environment:
      POSTGRES_PASSWORD: postgres
      POSTGRES_USER: postgres
      POSTGRES_DB: filestore
    volumes:
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d filestore"]
      interval: 5s
      timeout: 5s
      retries: 5

  server:
    build:
      context: .
      dockerfile: ./Dockerfile
    ports:
      - 3000:3000
    volumes:
      - ./filestore:/filestore
    environment:
      - POSTGRES_HOST=db
      - DATABASE_PEPPER="some_black_pepper"
      - JWT_SECRET="some_jwt_secret"
      - FILE_STORAGE_PATH=/filestore
    depends_on:
      db:
        condition: service_healthy
